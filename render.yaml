# Render infrastructure-as-code: defines both the backend API and the
# frontend static site. Import this repo in the Render dashboard and it
# will create both services automatically.
#
# After the first deploy, set these env vars in the Render dashboard:
#   loglens-api  → DATABASE_URL  (Supabase connection string)
#   loglens-api  → CORS_ORIGIN   (frontend URL, e.g. https://loglens-web.onrender.com)
#   loglens-web  → VITE_API_URL  (backend URL, e.g. https://loglens-api.onrender.com)

services:
  # ── Backend: Express + Prisma API ────────────────────────────────────────
  - type: web
    name: loglens-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: AI_PROVIDER
        value: mock
      # Set these in the Render dashboard (do not hardcode secrets here):
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # ── Frontend: React static site ──────────────────────────────────────────
  - type: web
    name: loglens-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to the backend URL after deploying loglens-api:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
